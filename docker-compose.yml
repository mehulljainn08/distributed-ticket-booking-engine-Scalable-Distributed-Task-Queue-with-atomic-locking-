services:
  redis:
    image: redis:7-alpine
    container_name: redis-server
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: gateway-load-balancer
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway

  orchestrator:
    build:
      context: ./orchestrator-go
      dockerfile: dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_ADDR=redis:6379

    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  worker-node:
    build:
      context: ./worker-node
      dockerfile: Dockerfile

    restart: always
    env_file:
      - .env
    environment:
      - REDIS_ADDR=redis:6379
      - WEBHOOK_URL=http://database-webhook-node:4000/webhook/booking-result
      - ORCHESTRATOR_URL=http://orchestrator:8080

    depends_on:
      - redis
      - database-webhook-node
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  api-gateway:
    build:
      context: ./api-gateway-node
      dockerfile: dockerfile

    restart: always
    env_file:
      - .env
    environment:
      - ORCHESTRATOR_URL=${ORCHESTRATOR_URL}
      - ORCHESTRATOR_PORT=${ORCHESTRATOR_PORT}
      - API_GATEWAY_PORT=${API_GATEWAY_PORT}

    depends_on:
      - orchestrator
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  database-webhook-node:
    build:
      context: ./database-webhook-node
      dockerfile: Dockerfile
    container_name: database-webhook-node
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - WEBHOOK_SERVICE_PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  postgres_data:
  redis_data:
