version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: redis-server
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    restart: always
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: booking_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
